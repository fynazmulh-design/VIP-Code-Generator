<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Code Generator - Nazmul IT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        .mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-lg bg-[#09090b] p-8 rounded-2xl border border-white/10 shadow-[0_0_50px_rgba(168,85,247,0.15)] relative overflow-hidden">
        <!-- Glow Shape -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-purple-600/20 blur-3xl rounded-full pointer-events-none"></div>

        <div class="flex items-center justify-center gap-3 mb-8">
            <i class="ph-fill ph-shield-check text-4xl text-purple-500"></i>
            <h2 class="text-2xl font-bold tracking-tight text-white">VIP Code Generator</h2>
        </div>
        
        <div class="space-y-5 relative z-10">
            <div>
                <label class="block text-xs text-gray-400 font-bold uppercase tracking-wider mb-2">Package Name</label>
                <select id="planName" class="w-full bg-[#020617] border border-white/10 p-3.5 rounded-lg text-white outline-none focus:border-purple-500 transition font-bold appearance-none">
                    <option value="Basic Learning">Basic Learning (1 Month)</option>
                    <option value="Standard Learning">Standard Learning (3 Months)</option>
                    <option value="Pro Learning">Pro Learning (6 Months)</option>
                    <option value="Legend VIP">Legend VIP (1 Year)</option>
                    <option value="Custom Plan">Custom Master Plan</option>
                </select>
            </div>

            <div class="grid grid-cols-3 gap-4">
                <div>
                    <label class="block text-xs text-gray-400 font-bold uppercase tracking-wider mb-2">Days</label>
                    <input type="number" id="days" value="30" min="0" class="w-full bg-[#020617] border border-white/10 p-3.5 rounded-lg text-center text-white outline-none focus:border-purple-500 transition mono font-bold">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 font-bold uppercase tracking-wider mb-2">Hours</label>
                    <input type="number" id="hours" value="0" min="0" max="23" class="w-full bg-[#020617] border border-white/10 p-3.5 rounded-lg text-center text-white outline-none focus:border-purple-500 transition mono font-bold">
                </div>
                <div>
                    <label class="block text-xs text-gray-400 font-bold uppercase tracking-wider mb-2">Minutes</label>
                    <input type="number" id="minutes" value="0" min="0" max="59" class="w-full bg-[#020617] border border-white/10 p-3.5 rounded-lg text-center text-white outline-none focus:border-purple-500 transition mono font-bold">
                </div>
            </div>
            
            <button onclick="generateAndSaveCode()" id="genBtn" class="w-full py-4 mt-2 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 rounded-xl font-black shadow-lg shadow-purple-500/25 transition transform hover:-translate-y-0.5 flex justify-center items-center gap-2">
                <i class="ph-bold ph-magic-wand text-lg"></i> Generate & Save Code
            </button>
        </div>
        
        <div id="resultBox" class="hidden mt-8 text-center p-6 bg-green-500/10 border border-green-500/30 rounded-xl transition-all">
            <p class="text-xs text-green-400 font-bold uppercase tracking-widest mb-3 flex justify-center items-center gap-1"><i class="ph-fill ph-check-circle"></i> Ready & Saved to Sheet</p>
            <h1 id="generatedCode" class="text-2xl sm:text-3xl mono font-bold text-white tracking-widest mb-4 select-all"></h1>
            <button onclick="copyCode()" class="bg-black/40 px-5 py-2.5 rounded-lg text-sm font-bold text-gray-300 hover:text-white border border-white/10 transition hover:bg-black/60 flex justify-center items-center gap-2 mx-auto">
                <i class="ph-bold ph-copy"></i> Copy VIP Code
            </button>
        </div>
    </div>

    <script>
        // ⚠️ আপনার Web App URL এখানে বসান ⚠️
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwv49zfBOFTbmoamPIUqNcnjkB4s1RdGWXuBzQLTIJd3_b7ls3ociGJ3MbkxRACa8S7DQ/exec";

        function generateAndSaveCode() {
            const planName = document.getElementById('planName').value;
            const days = document.getElementById('days').value;
            const hours = document.getElementById('hours').value;
            const minutes = document.getElementById('minutes').value;
            
            if (days == 0 && hours == 0 && minutes == 0) { alert("Time cannot be zero!"); return; }
            
            const btn = document.getElementById('genBtn');
            btn.innerHTML = `<i class="ph-bold ph-spinner animate-spin text-lg"></i> Saving to Database...`;
            btn.disabled = true;

            // Generate Random Code (e.g., NAZMUL-A1B2-C3D4)
            const p1 = Math.random().toString(36).substring(2, 6).toUpperCase();
            const p2 = Math.random().toString(36).substring(2, 6).toUpperCase();
            const newCode = `NAZMUL-${p1}-${p2}`;

            const data = new URLSearchParams();
            data.append('action', 'add_vip_code');
            data.append('code', newCode);
            data.append('planName', planName);
            data.append('days', days);
            data.append('hours', hours);
            data.append('minutes', minutes);

            fetch(WEB_APP_URL, { method: 'POST', body: data })
            .then(res => res.json())
            .then(result => {
                if(result.result === 'success') {
                    document.getElementById('resultBox').classList.remove('hidden');
                    document.getElementById('generatedCode').innerText = newCode;
                } else {
                    alert("Error: " + result.message);
                }
            })
            .catch(err => alert("Network Error! Try again."))
            .finally(() => {
                btn.innerHTML = `<i class="ph-bold ph-magic-wand text-lg"></i> Generate & Save Code`;
                btn.disabled = false;
            });
        }

        function copyCode() {
            const code = document.getElementById('generatedCode').innerText;
            navigator.clipboard.writeText(code);
            alert("✅ Code Copied!");
        }
    </script>
</body>
</html>
